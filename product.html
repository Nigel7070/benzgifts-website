<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - BenzGifts</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .back-btn { display: inline-block; padding: 0.8rem 1.5rem; background: #667eea; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 2rem; }
        
        .product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .product-images { position: relative; }
        .main-image { width: 100%; height: 500px; object-fit: cover; border-radius: 10px; margin-bottom: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 4rem; }
        .main-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        
        .color-swatches { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .color-swatch { width: 60px; height: 60px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all 0.3s; overflow: hidden; }
        .color-swatch img { width: 100%; height: 100%; object-fit: cover; }
        .color-swatch.active { border-color: #667eea; transform: scale(1.1); }
        
        .product-info h1 { font-size: 2rem; color: #2c3e50; margin-bottom: 1rem; }
        .product-price { font-size: 2rem; color: #667eea; font-weight: bold; margin-bottom: 2rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2c3e50; }
        .form-group select { width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        
        .quantity-selector { display: flex; align-items: center; gap: 1rem; }
        .quantity-btn { width: 40px; height: 40px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; font-size: 1.5rem; cursor: pointer; }
        .quantity-btn:hover { background: #667eea; color: white; }
        .quantity-display { font-size: 1.5rem; font-weight: bold; min-width: 40px; text-align: center; }
        
        .action-buttons { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
        .btn { flex: 1; padding: 1rem; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.3s; min-width: 150px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #28a745; color: white; }
        .btn-cart { background: #ff6b6b; color: white; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .weight-info { margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #667eea; }
        .weight-info-content { display: flex; align-items: center; gap: 0.5rem; }
        .weight-icon { font-size: 1.5rem; }
        .weight-label { font-weight: 600; color: #2c3e50; }
        .weight-value { color: #667eea; font-weight: bold; font-size: 1.1rem; }
        
        .stock-status { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; margin: 1rem 0; }
        .stock-status.in-stock { background: #d4edda; color: #155724; }
        .stock-status.out-of-stock { background: #f8d7da; color: #721c24; }
        
        .alert { padding: 1rem; border-radius: 8px; margin: 1rem 0; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        
        /* Floating Cart Button */
        .floating-cart {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .floating-cart:hover {
            transform: scale(1.1);
        }
        .floating-cart-icon {
            font-size: 1.8rem;
            color: white;
        }
        .floating-cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        /* Cart Modal */
        .cart-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
        .cart-overlay.active {
            display: block;
        }
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 450px;
            max-width: 90vw;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
            z-index: 2000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .cart-modal.active {
            display: flex;
        }
        .cart-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .cart-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        .cart-close {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }
        .cart-close:hover {
            background: rgba(255,255,255,0.2);
        }
        .cart-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .cart-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
        }
        .cart-empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .cart-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .cart-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .cart-item-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
        }
        .cart-item-details {
            font-size: 0.85rem;
            color: #666;
        }
        .cart-item-price {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }
        .cart-item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }
        .cart-quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cart-qty-btn {
            width: 28px;
            height: 28px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .cart-qty-btn:hover {
            background: #667eea;
            color: white;
        }
        .cart-qty-display {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }
        .cart-remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        .cart-remove-btn:hover {
            background: #ff5252;
        }
        .cart-footer {
            padding: 1.5rem;
            border-top: 2px solid #eee;
            background: #f8f9fa;
            flex-shrink: 0;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #2c3e50;
        }
        .cart-total-price {
            color: #667eea;
        }
        .cart-checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .cart-checkout-btn:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .product-detail { grid-template-columns: 1fr; gap: 2rem; }
            .main-image { height: 300px; }
            .floating-cart {
                bottom: 1rem;
                right: 1rem;
                width: 50px;
                height: 50px;
            }
            .floating-cart-icon { font-size: 1.5rem; }
            .cart-modal {
                width: 100vw;
                max-width: 100vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Shop</a>
        
        <div class="product-detail">
            <!-- Images Section -->
            <div class="product-images">
                <div class="main-image" id="mainImage">
                    <span>🎨</span>
                </div>
                <div class="color-swatches" id="colorSwatches"></div>
            </div>
            
            <!-- Info Section -->
            <div class="product-info">
                <h1 id="productName">Loading...</h1>
                
                <!-- Description -->
                <div id="productDescription" style="color: #666; margin: 1rem 0; line-height: 1.6; font-size: 1.05rem;"></div>
                
                <div class="product-price" id="productPrice">RM 0.00</div>
                
                <!-- Weight Info -->
                <div class="weight-info">
                    <div class="weight-info-content">
                        <span class="weight-icon">📦</span>
                        <span class="weight-label">Weight per item:</span>
                        <span class="weight-value" id="productWeight">180g</span>
                    </div>
                    <div style="color: #666; font-size: 0.85rem; margin-top: 0.3rem;">
                        Shipping costs are calculated based on total weight at checkout
                    </div>
                </div>
                
                <div class="stock-status in-stock" id="stockStatus">In Stock</div>
                
                <div class="alert alert-success" id="successMsg" style="display: none;"></div>
                <div class="alert alert-error" id="errorMsg" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="colorSelect">Select Color</label>
                    <select id="colorSelect" onchange="updateColorSelection()">
                        <option value="">Choose a color...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="sizeSelect">Select Size</label>
                    <select id="sizeSelect" onchange="updatePrice()">
                        <option value="">Choose a size...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Quantity</label>
                    <div class="quantity-selector">
                        <button class="quantity-btn" onclick="decreaseQuantity()">-</button>
                        <span class="quantity-display" id="quantity">1</span>
                        <button class="quantity-btn" onclick="increaseQuantity()">+</button>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="addToCart()">
                        🛒 Add to Cart
                    </button>
                    <button class="btn btn-secondary" onclick="buyNow()">
                        ⚡ Buy Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Cart Button -->
    <div class="floating-cart" onclick="openCartModal()" title="View Cart">
        <span class="floating-cart-icon">🛒</span>
        <span class="floating-cart-badge" id="cartCount">0</span>
    </div>

    <!-- Cart Modal -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCartModal()"></div>
    <div class="cart-modal" id="cartModal">
        <div class="cart-header">
            <h2>🛒 Your Cart</h2>
            <button class="cart-close" onclick="closeCartModal()">×</button>
        </div>
        <div class="cart-body" id="cartBody">
            <!-- Cart items will be loaded here -->
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="cart-total">
                <span>Total:</span>
                <span class="cart-total-price" id="cartTotalPrice">RM 0.00</span>
            </div>
            <button class="cart-checkout-btn" onclick="window.location.href='index.html#cart'">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://oomvdejocpdtqcmeacii.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vbXZkZWpvY3BkdHFjbWVhY2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk5MzA1NjksImV4cCI6MjA3NTUwNjU2OX0.0P_dEqRlvSUVJiCF_F0mboSenqvbp64ZV9islyvcF_E';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentProduct = null;
        let quantity = 1;

        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            updateCartCount();
        });

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                alert('Product not found!');
                window.location.href = 'index.html';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .eq('id', productId)
                    .single();

                if (error) throw error;
                
                currentProduct = data;
                displayProduct(data);
            } catch (error) {
                console.error('Error loading product:', error);
                alert('Error loading product');
            }
        }

        function displayProduct(product) {
            document.getElementById('productName').textContent = product.name || 'Unnamed Product';
            document.getElementById('productDescription').textContent = product.description || '';
            document.getElementById('productWeight').textContent = (product.weight_grams || 180) + 'g';
            
            // Display colors
            if (product.colors && Array.isArray(product.colors) && product.colors.length > 0) {
                const swatchesHTML = product.colors.map((color, index) => `
                    <div class="color-swatch ${index === 0 ? 'active' : ''}" 
                         data-color="${color.name}" 
                         data-image="${color.image}"
                         onclick="selectColor('${color.name}', '${color.image}', this)">
                        <img src="${color.image}" alt="${color.name}">
                    </div>
                `).join('');
                document.getElementById('colorSwatches').innerHTML = swatchesHTML;
                
                const colorSelect = document.getElementById('colorSelect');
                colorSelect.innerHTML = '<option value="">Choose a color...</option>' +
                    product.colors.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                
                // Set first color as selected
                selectColor(product.colors[0].name, product.colors[0].image, document.querySelector('.color-swatch'));
                colorSelect.value = product.colors[0].name;
            }
            
            // Display sizes
            if (product.sizes && Array.isArray(product.sizes) && product.sizes.length > 0) {
                const sizeSelect = document.getElementById('sizeSelect');
                sizeSelect.innerHTML = '<option value="">Choose a size...</option>' +
                    product.sizes.map(s => `<option value="${s}">${s}</option>`).join('');
            }
            
            // Display first variant price
            if (product.variants && Array.isArray(product.variants) && product.variants.length > 0) {
                const firstPrice = product.variants[0].price || 0;
                document.getElementById('productPrice').textContent = `RM ${firstPrice.toFixed(2)}`;
            }
            
            updateStockStatus();
        }

        function selectColor(colorName, imageUrl, element) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            if (element) element.classList.add('active');
            
            const mainImage = document.getElementById('mainImage');
            mainImage.innerHTML = `<img src="${imageUrl}" alt="${colorName}">`;
            
            document.getElementById('colorSelect').value = colorName;
            updatePrice();
        }

        function updateColorSelection() {
            const colorName = document.getElementById('colorSelect').value;
            if (!colorName || !currentProduct.colors) return;
            
            const color = currentProduct.colors.find(c => c.name === colorName);
            if (color) {
                const swatch = document.querySelector(`[data-color="${colorName}"]`);
                selectColor(colorName, color.image, swatch);
            }
        }

        function updatePrice() {
            const color = document.getElementById('colorSelect').value;
            const size = document.getElementById('sizeSelect').value;
            
            if (!color || !size || !currentProduct.variants) return;
            
            const variant = currentProduct.variants.find(v => v.color === color && v.size === size);
            if (variant) {
                document.getElementById('productPrice').textContent = `RM ${(variant.price * quantity).toFixed(2)}`;
                updateStockStatus();
            }
        }

        function updateStockStatus() {
            const color = document.getElementById('colorSelect').value;
            const size = document.getElementById('sizeSelect').value;
            
            if (!color || !size || !currentProduct.variants) return;
            
            const variant = currentProduct.variants.find(v => v.color === color && v.size === size);
            const stockStatus = document.getElementById('stockStatus');
            
            if (variant && variant.stock > 0) {
                stockStatus.className = 'stock-status in-stock';
                stockStatus.textContent = `In Stock (${variant.stock} available)`;
            } else {
                stockStatus.className = 'stock-status out-of-stock';
                stockStatus.textContent = 'Out of Stock';
            }
        }

        function increaseQuantity() {
            quantity++;
            document.getElementById('quantity').textContent = quantity;
            updatePrice();
        }

        function decreaseQuantity() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('quantity').textContent = quantity;
                updatePrice();
            }
        }

        function addToCart() {
            const color = document.getElementById('colorSelect').value;
            const size = document.getElementById('sizeSelect').value;
            
            if (!color || !size) {
                showError('Please select color and size!');
                return;
            }
            
            const variant = currentProduct.variants.find(v => v.color === color && v.size === size);
            if (!variant || variant.stock < quantity) {
                showError('Not enough stock available!');
                return;
            }
            
            const colorObj = currentProduct.colors.find(c => c.name === color);
            
            const cartItem = {
                product_id: currentProduct.id,
                name: currentProduct.name,
                color: color,
                size: size,
                price: variant.price,
                quantity: quantity,
                image: colorObj ? colorObj.image : '',
                weight_grams: currentProduct.weight_grams || 180
            };
            
            let cart = JSON.parse(localStorage.getItem('benzgifts_cart') || '[]');
            
            const existingIndex = cart.findIndex(item => 
                item.product_id === cartItem.product_id &&
                item.color === cartItem.color &&
                item.size === cartItem.size
            );
            
            if (existingIndex >= 0) {
                cart[existingIndex].quantity += quantity;
            } else {
                cart.push(cartItem);
            }
            
            localStorage.setItem('benzgifts_cart', JSON.stringify(cart));
            showSuccess('✅ Added to cart successfully!');
            updateCartCount();
        }

        function buyNow() {
            const color = document.getElementById('colorSelect').value;
            const size = document.getElementById('sizeSelect').value;
            
            if (!color || !size) {
                showError('Please select color and size!');
                return;
            }
            
            const variant = currentProduct.variants.find(v => v.color === color && v.size === size);
            if (!variant || variant.stock < quantity) {
                showError('Not enough stock available!');
                return;
            }
            
            const colorObj = currentProduct.colors.find(c => c.name === color);
            
            const cartItem = {
                product_id: currentProduct.id,
                name: currentProduct.name,
                color: color,
                size: size,
                price: variant.price,
                quantity: quantity,
                image: colorObj ? colorObj.image : '',
                weight_grams: currentProduct.weight_grams || 180
            };
            
            localStorage.setItem('benzgifts_buynow', JSON.stringify(cartItem));
            window.location.href = 'checkout.html?buynow=true';
        }

        function showSuccess(message) {
            const el = document.getElementById('successMsg');
            el.textContent = message;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showError(message) {
            const el = document.getElementById('errorMsg');
            el.textContent = message;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('benzgifts_cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
            const badge = document.getElementById('cartCount');
            if (badge) {
                badge.textContent = totalItems;
                badge.style.display = totalItems > 0 ? 'flex' : 'none';
            }
        }

        function openCartModal() {
            document.getElementById('cartModal').classList.add('active');
            document.getElementById('cartOverlay').classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
            displayCartItems();
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.remove('active');
            document.getElementById('cartOverlay').classList.remove('active');
            document.body.style.overflow = ''; // Re-enable scrolling
        }

        function displayCartItems() {
            const cart = JSON.parse(localStorage.getItem('benzgifts_cart') || '[]');
            const cartBody = document.getElementById('cartBody');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.length === 0) {
                cartBody.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Add some items to get started!</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
                return;
            }
            
            cartFooter.style.display = 'block';
            
            let totalPrice = 0;
            let cartHTML = '';
            
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                totalPrice += itemTotal;
                
                cartHTML += `
                    <div class="cart-item">
                        <img src="${item.image || 'https://via.placeholder.com/80'}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-details">
                                Color: ${item.color} | Size: ${item.size}
                            </div>
                            <div class="cart-item-price">RM ${itemTotal.toFixed(2)}</div>
                            <div class="cart-item-actions">
                                <div class="cart-quantity-controls">
                                    <button class="cart-qty-btn" onclick="updateCartQuantity(${index}, -1)">−</button>
                                    <span class="cart-qty-display">${item.quantity}</span>
                                    <button class="cart-qty-btn" onclick="updateCartQuantity(${index}, 1)">+</button>
                                </div>
                                <button class="cart-remove-btn" onclick="removeCartItem(${index})">🗑️ Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            cartBody.innerHTML = cartHTML;
            document.getElementById('cartTotalPrice').textContent = `RM ${totalPrice.toFixed(2)}`;
        }

        function updateCartQuantity(index, change) {
            let cart = JSON.parse(localStorage.getItem('benzgifts_cart') || '[]');
            
            if (cart[index]) {
                cart[index].quantity += change;
                
                // Remove item if quantity becomes 0
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                
                localStorage.setItem('benzgifts_cart', JSON.stringify(cart));
                updateCartCount();
                displayCartItems();
            }
        }

        function removeCartItem(index) {
            let cart = JSON.parse(localStorage.getItem('benzgifts_cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('benzgifts_cart', JSON.stringify(cart));
            updateCartCount();
            displayCartItems();
        }
    </script>
</body>
</html>
